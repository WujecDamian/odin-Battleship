<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battleship.com</title>
  <script defer src="main.js"></script></head>
  <body>
    <nav class="nav">
      <div class="logo">
        <img
          src="df82127ba967b6fff785.png"
          alt="Logo with text 'Battleships'"
          width="278px"
          height="60.5px"
        />
      </div>
    </nav>
    <main class="main">
      <section class="main__info">
        <div class="info__newgame">
          <button class="startgame__btn">Start Game</button>
        </div>
        <div class="info__turn">
          <p>Turn:</p>
        </div>
        <div class="info__mode">
          <p>2P/AI</p>
        </div>
      </section>
      <section class="game">
        <div class="game__ships1 player1">
          <div class="ship1">
            <img
              src="3e7af607351f19c0ad79.png"
              alt="picture of carrier ship"
              width="150px"
              height="auto"
              draggable="true"
            />
          </div>
          <div class="ship2">
            <img
              src="645c71612dc3c4fca7e8.png"
              alt="picture of battleship ship"
              width="140px"
              height="auto"
              draggable="true"
            />
          </div>
          <div class="ship3">
            <img
              src="034bae7ffd7a946423a9.png"
              alt="picture of cruiser ship"
              width="130px"
              height="auto"
              draggable="true"
            />
          </div>
          <div class="ship4">
            <img
              src="dc33e275dc0bf9b51cba.png"
              alt="picture of submarine ship"
              width="130px"
              height="auto"
              draggable="true"
            />
          </div>
          <div class="ship5">
            <img
              src="5566fe556e90073d4764.png"
              alt="picture of destroyer ship"
              width="120px"
              height="auto"
              draggable="true"
            />
          </div>
        </div>
        <div class="game__board1 player1">
          <div class="board1"></div>
        </div>
        <div class="game__board2 player2">
          <div class="board2"></div>
        </div>
        <div class="game__ships2 player2">
          <div class="ship1">
            <img
              src="3e7af607351f19c0ad79.png"
              alt="picture of carrier ship"
              width="150px"
              height="auto"
              draggable="true"
            />
          </div>
          <div class="ship2">
            <img
              src="645c71612dc3c4fca7e8.png"
              alt="picture of battleship ship"
              width="140px"
              height="auto"
              draggable="true"
            />
          </div>
          <div class="ship3">
            <img
              src="034bae7ffd7a946423a9.png"
              alt="picture of cruiser ship"
              width="130px"
              height="auto"
              draggable="true"
            />
          </div>
          <div class="ship4">
            <img
              src="dc33e275dc0bf9b51cba.png"
              alt="picture of submarine ship"
              width="130px"
              height="auto"
              draggable="true"
            />
          </div>
          <div class="ship5">
            <img
              src="5566fe556e90073d4764.png"
              alt="picture of destroyer ship"
              width="120px"
              height="auto"
              draggable="true"
            />
          </div>
        </div>
      </section>
      <section class="main__info2">
        <div class="info2__turn">
          <p></p>
        </div>
      </section>
    </main>
    <footer class="footer"></footer>
  </body>
</html>
