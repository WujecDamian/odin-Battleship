<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battleship.com</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="index.js" defer></script>
  </head>
  <body>
    <nav class="nav">
      <div class="logo">
        <img
          src="./assets/images/battleships-logo.png"
          alt="Logo with text 'Battleships'"
          width="278px"
          height="60.5px"
        />
      </div>
    </nav>
    <main class="main">
      <section class="main__info">
        <div class="info__turns">
          <p>Turn:</p>
        </div>
        <div class="info__mode">
          <p>2P/AI</p>
        </div>
      </section>
      <section class="game">
        <div class="game__ships1"></div>
        <div class="game__board1">
          <div class="board1"></div>
        </div>
        <div class="game__board2">
          <div class="board2"></div>
        </div>
        <div class="game__ships2"></div>
      </section>
    </main>
    <footer class="footer"></footer>
  </body>
</html>
