<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battleship.com</title>
  </head>
  <body>
    <nav class="nav">
      <div class="logo">
        <img
          src="./assets/images/battleships-logo.png"
          alt="Logo with text 'Battleships'"
          width="278px"
          height="60.5px"
        />
      </div>
    </nav>
    <main class="main">
      <section class="main__info">
        <div class="info__newgame">
          <button class="newgame__btn">New Game</button>
        </div>
        <div class="info__turn">
          <p>Turn:</p>
        </div>
        <div class="info__mode">
          <p>2P/AI</p>
        </div>
      </section>
      <section class="game">
        <div class="game__ships1 player1">
          <div class="ship1">
            <img
              src="./assets/icons/ship-carrier.png"
              alt="picture of carrier ship"
              width="150px"
              height="auto"
              draggable="true"
            />
          </div>
          <div class="ship2">
            <img
              src="./assets/icons/ship-battleship.png"
              alt="picture of battleship ship"
              width="140px"
              height="auto"
              draggable="true"
            />
          </div>
          <div class="ship3">
            <img
              src="./assets/icons/ship-cruiser.png"
              alt="picture of cruiser ship"
              width="130px"
              height="auto"
              draggable="true"
            />
          </div>
          <div class="ship4">
            <img
              src="./assets/icons/ship-submarine.png"
              alt="picture of submarine ship"
              width="130px"
              height="auto"
              draggable="true"
            />
          </div>
          <div class="ship5">
            <img
              src="./assets/icons/ship-destroyer.png"
              alt="picture of destroyer ship"
              width="120px"
              height="auto"
              draggable="true"
            />
          </div>
        </div>
        <div class="game__board1 player1">
          <div class="board1"></div>
        </div>
        <div class="game__board2 player2">
          <div class="board2"></div>
        </div>
        <div class="game__ships2 player2">
          <div class="ship1">
            <img
              src="./assets/icons/ship-carrier.png"
              alt="picture of carrier ship"
              width="150px"
              height="auto"
              draggable="true"
            />
          </div>
          <div class="ship2">
            <img
              src="./assets/icons/ship-battleship.png"
              alt="picture of battleship ship"
              width="140px"
              height="auto"
              draggable="true"
            />
          </div>
          <div class="ship3">
            <img
              src="./assets/icons/ship-cruiser.png"
              alt="picture of cruiser ship"
              width="130px"
              height="auto"
              draggable="true"
            />
          </div>
          <div class="ship4">
            <img
              src="./assets/icons/ship-submarine.png"
              alt="picture of submarine ship"
              width="130px"
              height="auto"
              draggable="true"
            />
          </div>
          <div class="ship5">
            <img
              src="./assets/icons/ship-destroyer.png"
              alt="picture of destroyer ship"
              width="120px"
              height="auto"
              draggable="true"
            />
          </div>
        </div>
      </section>
      <section class="main__info2">
        <div class="info2__turn">
          <p>PLAYER X MISSED A SHOT [9,2]</p>
        </div>
      </section>
    </main>
    <footer class="footer"></footer>
  </body>
</html>
